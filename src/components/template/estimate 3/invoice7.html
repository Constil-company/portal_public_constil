<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
</style>

</head>

<body class="p-4 md:p-10 flex justify-center items-center min-h-screen">

<div id="invoice" class="max-w-6xl w-full bg-white rounded-[3rem] shadow-2xl flex flex-col md:flex-row overflow-hidden border border-gray-50">
        
<!-- LEFT -->
<aside class="w-full md:w-[35%] p-10 md:p-14 border-r border-gray-100 flex flex-col justify-between">
<div class="space-y-10">

<div class="inline-block px-4 py-2 bg-blue-50 rounded-full">
<p class="text-[11px] font-extrabold text-[#2983FF]">Nº: {{estimateNumber}}</p>
</div>

<h1 class="text-2xl font-black text-[#1E263E] uppercase italic">Estimate</h1>

<div>
<h3 class="text-xl font-bold">{{companyName}}</h3>
<p>{{from}}</p>
<p>{{fromAddress}}</p>
</div>

<div>
<h3 class="text-xl font-bold">{{shipTo}}</h3>
<p>{{billTo}}</p>
<p>{{billToAddress}}</p>
</div>

</div>

<div>{{signature}}</div>
</aside>

<!-- RIGHT -->
<main class="w-full md:w-[65%] p-10 md:p-14">

<h2 class="text-2xl font-bold mb-8">Items/Services</h2>

<!-- ✅ DYNAMIC CARDS -->
<div class="space-y-6">
{{itemsTable}}
</div>

<div class="mt-16 text-right space-y-2">
<p>Subtotal: ${{subtotal}}</p>
<p>Discount: ${{totalDiscount}}</p>
<p>Tax: ${{totalTax}}</p>
<h3>Total: ${{amount}}</h3>
</div>

</main>

</div>

<script>

/* ✅ CARD GENERATOR */
function generateItems(items) {
  return items.map(item => `
    
    <div class="bg-slate-50 rounded-[2rem] p-8 flex items-center justify-between gap-6 border border-slate-100 hover:shadow-md transition-shadow">
      
      <div class="flex items-center gap-6">
        <div class="space-y-1">
          
          <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">
            Item
          </p>

          <h4 class="text-lg font-extrabold text-slate-800">
            ${item.name}
          </h4>

          <p class="mt-1 text-sm font-normal text-slate-400 leading-relaxed">
            ${item.description || ""}
          </p>

          <!-- ✅ EXACT SAME UI -->
          <div class="grid grid-cols-2 gap-x-4 gap-y-1 pt-2">
            
            <p class="text-xs text-slate-400 font-bold">
              QTY: <span class="text-slate-800">${item.qty}</span>
            </p>

            <p class="text-xs text-slate-400 font-bold">
              DISCOUNT: <span class="text-slate-800">$${item.discount || 0}</span>
            </p>

            <p class="text-xs text-slate-400 font-bold">
              TAX: <span class="text-slate-800">$${item.tax || 0}</span>
            </p>

            <p class="text-xs text-slate-400 font-bold">
              TOTAL: <span class="text-slate-800">$${item.total}</span>
            </p>

          </div>

        </div>
      </div>

      <!-- RIGHT SIDE SAME -->
      <div class="text-right">
        <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest mb-1">
          UNIT PRICE:
        </p>
        <p class="text-xl font-black text-slate-800">
          $${item.price}
        </p>
      </div>

    </div>

  `).join('');
}

/* ✅ SAMPLE DATA (same structure) */
const data = {
  estimateNumber: "EST-001",
  companyName: "CONSTIL",
  from: "Company Address",
  fromAddress: "USA",
  shipTo: "Client Name",
  billTo: "Client Company",
  billToAddress: "Client Address",
  subtotal: 1000,
  totalDiscount: 50,
  totalTax: 20,
  amount: 970,
  signature: "Authorized Sign"
};

const items = [
  { name: "Website", description: "Design", qty: 1, price: 500, discount: 0, tax: 0, total: 500 },
  { name: "SEO", description: "", qty: 1, price: 500, discount: 50, tax: 20, total: 470 }
];


/* ✅ BINDING */
let html = document.getElementById("invoice").innerHTML;

html = html
.replace(/{{estimateNumber}}/g, data.estimateNumber)
.replace(/{{companyName}}/g, data.companyName)
.replace(/{{from}}/g, data.from)
.replace(/{{fromAddress}}/g, data.fromAddress)
.replace(/{{shipTo}}/g, data.shipTo)
.replace(/{{billTo}}/g, data.billTo)
.replace(/{{billToAddress}}/g, data.billToAddress)
.replace(/{{subtotal}}/g, data.subtotal)
.replace(/{{totalDiscount}}/g, data.totalDiscount)
.replace(/{{totalTax}}/g, data.totalTax)
.replace(/{{amount}}/g, data.amount)
.replace(/{{signature}}/g, data.signature)
.replace(/{{itemsTable}}/g, generateItems(items));

document.getElementById("invoice").innerHTML = html;

</script>

</body>
</html>
